<section class="home-page" aria-label="Home page">
  <div class="home-page__shell">
    <div class="home-page__hero">
      <div class="home-page__badge">Tablero estratégico</div>
      <h1>{{ homeUiState.title }}</h1>
      <p class="home-page__subtitle">
        Sumérgete en una partida de mesa moderna donde cada turno importa.
      </p>
    </div>

    <div class="home-page__actions">
      <a class="home-page__action-card" [routerLink]="['/lobby']">
        <span class="home-page__action-icon">🎲</span>
        <span class="home-page__action-title">{{ homeUiState.createGameLabel }}</span>
        <span class="home-page__action-copy">Abre una sala nueva y prepara la partida.</span>
      </a>

      <button class="home-page__action-card" type="button" (click)="openJoinModal()">
        <span class="home-page__action-icon">🧩</span>
        <span class="home-page__action-title">{{ homeUiState.joinGameLabel }}</span>
        <span class="home-page__action-copy">Únete a una mesa ya creada para seguir jugando.</span>
      </button>

      <a class="home-page__action-card home-page__action-card--spectator" [routerLink]="['/spectator']">
        <span class="home-page__action-icon">👁️</span>
        <span class="home-page__action-title">{{ homeUiState.spectatorLabel }}</span>
        <span class="home-page__action-copy">Observa la partida en vivo desde la vista del público.</span>
      </a>
    </div>
  </div>

  <app-base-modal
    [title]="modalTitle"
    [opened]="modalOpened"
    [closable]="modalClosable"
    (closed)="closeJoinModal()"
    (cancelled)="closeJoinModal()"
    (confirmed)="confirmJoin()">
    <div class="home-page__modal-field">
      <label class="home-page__modal-label" for="player-name-input">Nombre del jugador</label>
      <input
        id="player-name-input"
        class="home-page__modal-input"
        type="text"
        [value]="playerNameDraft()"
        (input)="playerNameDraft.set($any($event.target).value)"
        placeholder="Escribe tu nombre"
      />
    </div>
  </app-base-modal>
</section>
