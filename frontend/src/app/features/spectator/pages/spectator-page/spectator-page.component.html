<div class="page spectator">
  <header class="spectator__banner" role="status">
    <span class="pill pill--info">
      <span class="pill__dot" aria-hidden="true"></span>
      Modo espectador
    </span>
    <p class="spectator__note">Estás viendo la partida en vivo. Los controles están deshabilitados.</p>
  </header>

  <div class="spectator__hud">
    <app-turn-indicator [turn]="facade.turn()" />
    <app-treasure-panel [treasure]="facade.objective()" />
  </div>

  <div class="spectator__layout">
    <section class="spectator__board" aria-label="Tablero">
      <app-board [boardVisualState]="facade.board()" [interactive]="false" />
    </section>

    <aside class="spectator__sidebar">
      <section class="panel panel--tight spectator__players" aria-label="Jugadores">
        <h3 class="panel__title">Exploradores</h3>
        @for (player of facade.playerStatuses(); track player.id) {
          <app-player-status [player]="player" />
        }
      </section>

      <button type="button" class="btn btn--ghost btn--block" (click)="leave()">
        Dejar de espectar
      </button>
    </aside>
  </div>
</div>
