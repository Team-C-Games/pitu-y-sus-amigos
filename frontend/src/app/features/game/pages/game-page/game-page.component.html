<section class="game-page" aria-label="Game page">
  <div class="game-page__board-area">
    <app-game-board [boardVisualState]="boardVisualState()"></app-game-board>
  </div>

  <aside class="game-page__sidebar">
    <div class="game-page__panel-block">
      <app-side-panel
        [players]="players()"
        [currentTurnPlayer]="currentTurnPlayer()"
        [readyPlayers]="readyPlayers()"
        [spectators]="spectators()"
        [treasuresFound]="treasuresFound()">
      </app-side-panel>
    </div>

    <div class="game-page__mini-panels">
      <app-player-status
        [playerName]="currentPlayer().playerName"
        [playerAvatar]="currentPlayer().playerAvatar"
        [treasureCount]="currentPlayer().treasureCount">
      </app-player-status>

      <app-treasure-panel [treasure]="treasure()"></app-treasure-panel>
      <app-dice-panel [dice]="dice()"></app-dice-panel>
    </div>
  </aside>

  <div class="game-page__action-area">
    <app-action-panel></app-action-panel>
  </div>
</section>
