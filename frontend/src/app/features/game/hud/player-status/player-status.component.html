<article
  class="player"
  [class.player--active]="player().isActive"
  [class.player--offline]="player().isConnected === false"
>
  <span class="player__color" [style.--player-color]="player().color" aria-hidden="true"></span>

  <div class="player__info">
    <span class="player__name">{{ player().name }}</span>
    <span class="player__meta">
      {{ player().points }} {{ player().points === 1 ? 'símbolo' : 'símbolos' }}
      @if (player().isConnected === false) {
        · desconectado
      }
    </span>
  </div>

  @if (player().isActive) {
    <span class="player__turn" title="Turno activo" aria-label="Turno activo">◆</span>
  }
</article>
