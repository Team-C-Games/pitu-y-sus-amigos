<section class="turn panel--tight" aria-live="polite">
  @if (turn(); as currentTurn) {
    <span
      class="turn__orb"
      [style.--turn-color]="currentTurn.playerColor ?? 'var(--accent-cyan)'"
      aria-hidden="true"
    ></span>
    <div class="turn__info">
      <strong class="turn__name">Turno de {{ currentTurn.playerName }}</strong>
      <span class="turn__text">{{ currentTurn.text }}</span>
    </div>
  } @else {
    <span class="turn__text">Sin turno activo</span>
  }
</section>
