<section class="treasure" aria-label="Objetivo mágico actual">
  @if (treasure(); as currentTreasure) {
    <span class="treasure__symbol" aria-hidden="true">{{ currentTreasure.visual ?? '◈' }}</span>
    <div class="treasure__info">
      <span class="treasure__kicker">Objetivo mágico</span>
      <strong class="treasure__label">{{ currentTreasure.label }}</strong>
    </div>
  } @else {
    <div class="treasure__info">
      <span class="treasure__kicker">Objetivo mágico</span>
      <strong class="treasure__label treasure__label--done">Todos encontrados</strong>
    </div>
  }
</section>
