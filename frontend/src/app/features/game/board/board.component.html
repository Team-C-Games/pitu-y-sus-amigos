<div class="board-frame">
  <div
    class="board"
    role="grid"
    aria-label="Tablero del laberinto, 6 por 6"
    [class.board--interactive]="interactive()"
  >
    @for (row of indexes(); track row) {
      @for (column of indexes(); track column) {
        <app-tile
          role="gridcell"
          [position]="{ row: row, column: column }"
          [visual]="tileFor(row, column)"
          [selected]="isSelected(row, column)"
          [interactive]="interactive()"
          (click)="onTileClick(row, column)"
        />
      }
    }

    <div class="board__overlay" aria-hidden="true">
      @for (wall of boardVisualState().walls; track wallKey(wall)) {
        <app-wall
          [wall]="wall"
          [style.left]="wallLeft(wall)"
          [style.top]="wallTop(wall)"
          [style.width]="wall.orientation === 'horizontal' ? wallLength() : null"
          [style.height]="wall.orientation === 'vertical' ? wallLength() : null"
        />
      }

      @for (piece of boardVisualState().pieces; track piece.id) {
        <app-piece
          [piece]="piece"
          [style.left]="pieceLeft(piece)"
          [style.top]="pieceTop(piece)"
        />
      }
    </div>
  </div>
</div>
