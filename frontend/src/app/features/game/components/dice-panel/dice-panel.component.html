<div>
  @if (isDisabled) {
    <p>Dado deshabilitado</p>
  } @else if (diceState === 'rolling') {
    <p>Lanzándose...</p>
  } @else if (diceState === 'result' && diceValue !== undefined) {
    <p>Resultado: {{ diceValue }}</p>
  } @else {
    <p>Dado disponible</p>
  }

  @if (!isDisabled && diceState === 'available') {
    <button type="button" (click)="onRollClick()">Lanzar</button>
  }
</div>
