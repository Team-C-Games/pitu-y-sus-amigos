@if (toasts().length > 0) {
  <div class="toasts" role="log" aria-live="polite">
    @for (toast of toasts(); track toast.id) {
      <div class="toast toast--{{ toast.kind }}">
        <span class="toast__bar" aria-hidden="true"></span>
        <span class="toast__text">{{ toast.text }}</span>
        <button
          type="button"
          class="toast__close"
          aria-label="Cerrar notificación"
          (click)="closed.emit(toast.id)"
        >
          ✕
        </button>
      </div>
    }
  </div>
}
