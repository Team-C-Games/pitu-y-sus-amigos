<div
  class="toast"
  [ngClass]="type()"
  [style.--toast-duration]="duration() + 'ms'"
  role="status"
  aria-live="polite"
>
  <div class="toast__content">
    <span class="toast__icon" aria-hidden="true">
      @if (type() === 'success') {
        ✓
      } @else if (type() === 'warning') {
        !
      } @else if (type() === 'error') {
        ✕
      } @else {
        i
      }
    </span>

    <span class="toast__message">{{ message() }}</span>
  </div>

  <button class="toast__close" type="button" (click)="closeManually()" aria-label="Cerrar notificación">
    ✕
  </button>
</div>
