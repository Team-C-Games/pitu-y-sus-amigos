<div class="layout">
  <header class="layout__header">
    <app-top-bar
      [connectionStatus]="facade.connectionStatus()"
      [playerName]="playerName()"
    />
  </header>

  <main class="layout__main">
    <router-outlet></router-outlet>
  </main>
</div>

<app-loading-overlay [visible]="overlayVisible()" [message]="overlayMessage()" />

<app-notification-toast [toasts]="facade.toasts()" (closed)="facade.dismissToast($event)" />
